services:
  postgres:
    image: postgres:15-alpine
    container_name: review_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    container_name: review_es
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    volumes:
      - es_data:/usr/share/elasticsearch/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: review_redis
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    restart: unless-stopped

  backend:
    image: golang:1.25-alpine
    container_name: review_backend
    working_dir: /app
    command: sh -c "go run ./cmd/api/main.go"
    env_file:
      - ./config/prod/backend.env
    volumes:
      - ./backend:/app
      - go_pkg_cache:/go/pkg
    depends_on:
      - postgres
      - elasticsearch
      - redis
    restart: unless-stopped

  frontend:
    image: node:20-alpine
    container_name: review_frontend
    working_dir: /app
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0 --port 5173"
    env_file:
      - ./config/prod/frontend.app.env
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend
    restart: unless-stopped

  admin-frontend:
    image: node:20-alpine
    container_name: review_admin_frontend
    working_dir: /app
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0 --port 5174"
    env_file:
      - ./config/prod/frontend.admin.env
    volumes:
      - ./admin-frontend:/app
      - admin_frontend_node_modules:/app/node_modules
    depends_on:
      - backend
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    container_name: review_nginx
    ports:
      - "80:80"
    env_file:
      - ./config/prod/deploy.env
    volumes:
      - ./config/prod/nginx/default.conf.template:/etc/nginx/templates/default.conf.template:ro
    depends_on:
      - frontend
      - admin-frontend
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  es_data:
  go_pkg_cache:
  frontend_node_modules:
  admin_frontend_node_modules:
